name: "[backend] build -> push -> deploy"
on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy.yml
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-backend:
    permissions:
      contents: read
      packages: write
    uses: TIHLDE/tihlde-workflows/.github/workflows/_ci_ghcr.yml@main
    with:
      context: .
      dockerfile: ./Dockerfile.backend
      image_name: "drift-backend"

  deploy-backend:
    needs: build-backend
    if: github.event_name != 'pull_request'
    uses: TIHLDE/tihlde-workflows/.github/workflows/_notify_deploy.yml@main
    with:
      image_name: "drift-backend"
    secrets:
      DEPLOY_RECEIVER_TOKEN: ${{ secrets.DEPLOY_RECEIVER_TOKEN }}
